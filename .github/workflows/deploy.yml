name: Deploy Live Demo
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 🔍 [진단] 현재 어떤 폴더들이 있는지 로그에 찍어봅니다.
      - name: Check directory structure
        run: ls -R

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd demo
          flutter pub get

      - name: Build Web
        run: |
          cd demo
          flutter build web --base-href /gaply/ --release
      
      # ✨ [강제] 빌드 결과물이 있는지 확인하고 .nojekyll 생성
      - name: Check build result & Create .nojekyll
        run: |
          ls -R demo/build/web
          touch demo/build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: demo/build/web
          branch: gh-pages
          clean: true