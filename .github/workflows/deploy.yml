name: Deploy Flutter Demo

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 플러터 환경 구축
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 2. 의존성 설치 및 웹 빌드 (demo 폴더 기준)
      - name: Build Flutter Web
        run: |
          cd demo
          flutter pub get
          flutter create . --platforms web
          flutter build web --base-href /gaply/ --release
      
      # 3. Jekyll 방해 금지 파일 생성
      - name: Create .nojekyll
        run: touch demo/build/web/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. 중요: 빌드된 '플러터 파일'들을 업로드 (경로 수정됨)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'demo/build/web'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4