name: Deploy Flutter Demo
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 1. 의존성 설치 및 빌드 (demo 폴더 기준)
      - name: Build Flutter Web
        run: |
          cd demo
          flutter pub get
          flutter build web --base-href /gaply/ --release
      
      # 2. Jekyll 무시 파일 생성 (중요!)
      - name: Create .nojekyll
        run: touch demo/build/web/.nojekyll

      # 3. Pages 설정을 위한 준비
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. 빌드된 결과물(demo/build/web)을 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'demo/build/web'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
